# This workflow will install Python dependencies, run tests for a series of Python versions.

name: Python tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - python-version: "3.7"
            tox-env: py37
          - python-version: "3.8"
            tox-env: py38
          - python-version: "3.9"
            tox-env: py39
          - python-version: "3.10"
            tox-env: py310
          - python-version: "3.11"
            tox-env: py311

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install pip, tox
      run: |
        python -m pip install --upgrade pip
        pip install tox

    - name: Run Python tests
      run: tox -r -e ${{ matrix.tox-env }}

    - name: Run lint and typing checks
      if: matrix.python-version == '3.11'
      run: tox -r -e lint,typing
